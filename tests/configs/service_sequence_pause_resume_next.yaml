irrigation_unlimited:
  refresh_interval: 2000
  controllers:
    - name: Test Controller no pre/postamble
      pause_next: True
      zones:
        - name: 'Zone 1'
        - name: 'Zone 2'
        - name: 'Zone 3'
        - name: 'Zone 4'
      sequences:
        - name: "Seq 1"
          duration: "0:03:00"
          delay: "0:03:00"
          schedules:
            - time: "06:05"
          zones:
            - zone_id: 1
            - zone_id: [2,3]
            - zone_id: 4
        - name: "Seq 2"
          duration: "0:06:00"
          delay: "0:03:00"
          schedules:
            - time: "08:05"
          zones:
            - zone_id: 1
            - zone_id: 2
            - zone_id: 3
            - zone_id: 4
        - name: "Seq 3"
          duration: "0:06:00"
          delay: "0:03:00"
          schedules:
            - time: "08:15"
          zones:
            - zone_id: 1
            - zone_id: 2
            - zone_id: 3
            - zone_id: 4
  testing:
    enabled: true
    speed: 1.0
    output_events: false
    show_log: false
    autoplay: false
    times:
      - name: '1-Normal run'
        start: '2023-11-28 06:00'
        end: '2023-11-28 07:00'
        results:
          - {t: '2023-11-28 06:06:00', c: 1, z: 0, s: 1}
          - {t: '2023-11-28 06:06:00', c: 1, z: 1, s: 1}
          - {t: '2023-11-28 06:09:00', c: 1, z: 1, s: 0}
          - {t: '2023-11-28 06:09:00', c: 1, z: 0, s: 0}
          - {t: '2023-11-28 06:12:00', c: 1, z: 0, s: 1}
          - {t: '2023-11-28 06:12:00', c: 1, z: 2, s: 1}
          - {t: '2023-11-28 06:12:00', c: 1, z: 3, s: 1}
          - {t: '2023-11-28 06:15:00', c: 1, z: 2, s: 0}
          - {t: '2023-11-28 06:15:00', c: 1, z: 3, s: 0}
          - {t: '2023-11-28 06:15:00', c: 1, z: 0, s: 0}
          - {t: '2023-11-28 06:18:00', c: 1, z: 0, s: 1}
          - {t: '2023-11-28 06:18:00', c: 1, z: 4, s: 1}
          - {t: '2023-11-28 06:21:00', c: 1, z: 4, s: 0}
          - {t: '2023-11-28 06:21:00', c: 1, z: 0, s: 0}
